server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy to Auth service
    location /api/v1/auth/ {
        proxy_pass http://89.169.6.116:8000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to Profile service
    location /profile/api/v1/ {
        proxy_pass http://89.169.6.116:8080/profile/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to CaseProfile service (must be before case_go)
    location /api/v1/case_profile/ {
        rewrite ^/api/v1/case_profile/(.*)$ /api/v1/case_go/$1 break;
        proxy_pass http://89.169.6.116:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy to CaseGo service
    location /api/v1/case_go/ {
        proxy_pass http://89.169.6.116:8081/api/v1/case_go/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Flutter web — SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
}
