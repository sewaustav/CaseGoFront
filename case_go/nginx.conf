server {
    listen 80;
    server_name casego.ddns.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name casego.ddns.net;

    ssl_certificate /etc/letsencrypt/live/casego.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/casego.ddns.net/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/auth/ {
        proxy_pass http://89.169.6.116:8000/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/users/ {
        proxy_pass http://89.169.6.116:8000/api/v1/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /profile/api/v1/ {
        proxy_pass http://89.169.6.116:8080/profile/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/case_profile/ {
        rewrite ^/api/v1/case_profile/(.*)$ /api/v1/case_go/$1 break;
        proxy_pass http://89.169.6.116:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/case_go/ {
        proxy_pass http://89.169.6.116:8081/api/v1/case_go/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
}
