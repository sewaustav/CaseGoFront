name: CI/CD - Frontend (Flutter)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./case_go
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/casego-frontend:latest
          build-args: |
            AUTH_URL=http://${{ secrets.SERVER_HOST }}:8000/api/v1/auth
            PROFILE_URL=http://${{ secrets.SERVER_HOST }}:8080/profile/api/v1
            CASE_GO_URL=http://${{ secrets.SERVER_HOST }}:8081/api/v1/case_go
            CASE_PROFILE_URL=http://${{ secrets.SERVER_HOST }}:8082/api/v1/case_go
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/casego/frontend
            git pull
            echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull frontend
            docker compose up -d frontend
